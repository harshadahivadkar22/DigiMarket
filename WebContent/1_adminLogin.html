<!DOCTYPE html>
<html>
<head>
  <meta charset="ISO-8859-1">
  <title>DigiMarket - Admin Login</title>
  
  <!-- Font Awesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

  <style>
    body {
      background: linear-gradient(to right, #e0f7fa, #f1f8e9);
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
    }

    .login-box {
      background: #ffffff;
      padding: 40px;
      border-radius: 15px;
      box-shadow: 0 10px 25px rgba(0, 0, 0, 0.15);
      width: 400px;
      text-align: center;
      position: relative;
      transition: transform 0.3s ease;
    }

    .login-box:hover {
      transform: scale(1.03);
    }

    .logo {
      width: 80px;
      height: 80px;
      margin-bottom: 15px;
    }

    h2 {
      color: #2e7d32;
      margin-bottom: 25px;
      font-size: 28px;
      position: relative;
    }

    input[type="text"], input[type="password"] {
      width: 100%;
      padding: 12px 15px;
      margin: 12px 0;
      border: 1px solid #bdbdbd;
      border-radius: 8px;
      font-size: 16px;
      outline: none;
      transition: border 0.2s;
    }

    input[type="text"]:focus, input[type="password"]:focus {
      border-color: #2e7d32;
    }

    input[type="submit"] {
      width: 100%;
      padding: 12px;
      background-color: #388e3c;
      border: none;
      color: white;
      font-size: 17px;
      font-weight: bold;
      border-radius: 8px;
      cursor: pointer;
      transition: background-color 0.3s ease, box-shadow 0.3s ease;
      margin-top: 10px;
    }

    input[type="submit"]:hover {
      background-color: #2e7d32;
      box-shadow: 0 6px 14px rgba(0, 0, 0, 0.2);
    }

    .icon-label {
      font-size: 14px;
      color: #555;
      text-align: left;
      margin-top: 8px;
    }

    .back-link {
      display: inline-block;
      margin-top: 20px;
      color: #2e7d32;
      text-decoration: none;
      font-weight: 600;
      transition: color 0.3s ease;
    }

    .back-link:hover {
      color: #1b5e20;
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <div class="login-box">
    <!-- Website Logo -->
    
    <h2>Admin Login</h2>

    <form action="adminLogin" method="post">
      <div class="icon-label"><i class="fas fa-envelope"></i> Email</div>
      <input type="text" name="email" placeholder="Enter your email" required> 

      <div class="icon-label"><i class="fas fa-lock"></i> Password</div>
      <input type="password" name="password" placeholder="Enter your password" required>

      <input type="submit" value="Login">
    </form>

    <a class="back-link" href="index.html"><i class="fas fa-arrow-left"></i> Back to Home Page</a>
  </div>
</body>
</html>

<!DOCTYPE html>
<html>
<head>
  <meta charset="ISO-8859-1">
  <title>DigiMarket - Home</title>
  
  <!-- Font Awesome CDN for Icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

  <style>
    body {
      margin: 0;
      padding: 0;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(to right, #e0f7fa, #f1f8e9);
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .container {
      text-align: center;
    }

    .title {
      font-size: 48px;
      color: #2e7d32;
      margin-bottom: 50px;
      font-weight: bold;
      text-shadow: 2px 2px #a5d6a7;
    }

    .role-boxes {
      display: flex;
      justify-content: center;
      gap: 30px;
      flex-wrap: wrap;
    }

    .role-card {
      text-decoration: none;
      color: #ffffff;
      background-color: #388e3c;
      padding: 25px 40px;
      font-size: 20px;
      border-radius: 12px;
      box-shadow: 0 6px 12px rgba(0, 0, 0, 0.2);
      transition: all 0.3s ease;
      width: 220px;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .role-card i {
      font-size: 30px;
      margin-bottom: 10px;
    }

    .role-card:hover {
      background-color: #2e7d32;
      transform: translateY(-5px);
      box-shadow: 0 8px 16px rgba(0, 0, 0, 0.25);
    }
  </style>
</head>
<body>
  <div class="container">
    <h1 class="title">DigiMarket</h1>
    
    <div class="role-boxes">
      <a href="1_adminLogin.html" class="role-card">
        <i class="fas fa-user-shield"></i>
        Admin Login
      </a>

      <a href="1_registerFarmer.html" class="role-card">
        <i class="fas fa-tractor"></i>
        Farmer Register
      </a>

      <a href="1_registerBuyer.html" class="role-card">
        <i class="fas fa-shopping-cart"></i>
        Buyer Register
      </a>
    </div>
  </div>
</body>
</html>

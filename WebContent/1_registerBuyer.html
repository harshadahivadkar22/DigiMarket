<html>
<head>
  <meta charset="ISO-8859-1">
  <title>Register Buyer - DigiMarket</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    body {
      background: linear-gradient(to right, #fffde7, #f0f4c3);
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
      padding: 20px;
    }

    .register-box {
      background: white;
      padding: 40px 30px;
      border-radius: 15px;
      box-shadow: 0 10px 25px rgba(0, 0, 0, 0.15);
      max-width: 450px;
      width: 100%;
      box-sizing: border-box;
    }

    h2 {
      color: #33691e;
      margin-bottom: 25px;
      font-size: 28px;
    }

    input[type="text"],
    input[type="password"],
    input[type="email"] {
      width: 100%;
      padding: 12px;
      margin: 8px 0 15px 0;
      border: 1px solid #ccc;
      border-radius: 8px;
      font-size: 16px;
      transition: border-color 0.3s ease;
    }

    input[type="text"]:focus,
    input[type="password"]:focus,
    input[type="email"]:focus {
      border-color: #8bc34a;
      outline: none;
    }

    input[type="submit"] {
      width: 100%;
      padding: 12px;
      background-color: #689f38;
      border: none;
      color: white;
      font-size: 17px;
      font-weight: bold;
      border-radius: 8px;
      cursor: pointer;
      margin-top: 10px;
      transition: background-color 0.3s ease;
    }

    input[type="submit"]:hover {
      background-color: #558b2f;
    }

    .icon-label {
      font-size: 14px;
      color: #555;
      text-align: left;
      margin-top: 10px;
    }

    a {
      display: block;
      margin-top: 12px;
      text-decoration: none;
      color: #33691e;
      font-weight: 500;
      font-size: 14px;
    }

    a:hover {
      text-decoration: underline;
      color: #558b2f;
    }
  </style>
</head>
<body>
  <div class="register-box">
    <h2><i class="fas fa-shopping-cart"></i> Buyer Registration</h2>
    <form action="RegisterBuyer" method="post">

      <div class="icon-label"><i class="fas fa-user"></i> Buyer Name</div>
      <input type="text" name="buyerName" placeholder="Enter your name" required>

      <div class="icon-label"><i class="fas fa-phone"></i> Buyer Contact</div>
      <input type="text" name="buyerConatct" placeholder="Mobile number" required>

      <div class="icon-label"><i class="fas fa-map-marker-alt"></i> Buyer Address</div>
      <input type="text" name="buyerAddress" placeholder="Your address" required>

      <div class="icon-label"><i class="fas fa-envelope"></i> Buyer Email</div>
      <input type="email" name="buyerEmail" placeholder="Enter your email" required>

      <div class="icon-label"><i class="fas fa-lock"></i> Buyer Password</div>
      <input type="password" name="buyerPassword" placeholder="Create a password" required>

      <input type="submit" value="Register">

      <a href="11_buyerLogin.jsp">Already have an account? Login</a>
      <a href="index.html">Back to Home Page</a>
    </form>
  </div>
</body>
</html>
